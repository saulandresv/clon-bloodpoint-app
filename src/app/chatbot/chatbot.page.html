<ion-header>

</ion-header>

<ion-content class="no-scroll-content" [fullscreen]="true">
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size-md="8" size-sm="12">
        <ion-card class="chat-container">
          <ion-card-header>
            <ion-card-title class="ion-text-center">Chat Automatizado</ion-card-title>
          </ion-card-header>

          <!-- Contenedor de mensajes con scroll -->
          <div class="chat-box">
            <div *ngFor="let msg of messages" [ngClass]="msg.sender === 'user' ? 'message user' : 'message bot'">
              <div class="bubble">
                {{ msg.text }}
              </div>
            </div>
          </div>

          <!-- Input justo debajo -->
          <div class="input-area">
            <ion-item lines="none">
              <ion-input
                [(ngModel)]="newMessage"
                placeholder="Escribe tu mensaje..."
                (keyup.enter)="sendMessage()"
                clearInput>
              </ion-input>
              <ion-button fill="clear" (click)="sendMessage()">
                <ion-icon slot="icon-only" name="send-outline"></ion-icon>
              </ion-button>
            </ion-item>
          </div>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
