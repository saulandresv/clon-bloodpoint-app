<ion-content>
  <div class="scan-container">
    <h1>Escanea el código QR</h1>
    <p>Apunta la cámara hacia el código QR del donante</p>
    <ion-button 
      class="cancel-button" 
      (click)="dismiss()"
      fill="solid"
      color="light"
      shape="round"
      size="large">
      <ion-icon name="close-outline" slot="start"></ion-icon>
      Cancelar
    </ion-button>
  </div>
</ion-content>
